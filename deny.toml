# Configuration for `cargo deny`. Run with `cargo deny check`.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Permit wildcard versions on *path* dependencies within this workspace. Two
# crates (matter-cert, matter-crypto) dev-depend on themselves by path to turn
# on their own `test-support` feature for tests, and that self-reference must
# carry no `version` key — cargo strips a path-only dev-dependency when
# packaging, and with a version `cargo publish` tries to resolve the crate from
# crates.io while packaging that very crate, and fails. The wildcard is
# therefore load-bearing for publishing, and reaches no third-party code: these
# are our own crates, by path, in dev-dependencies only.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
